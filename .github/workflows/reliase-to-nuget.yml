name: release-to-nuget

on:
  release:
    types: [published]

jobs:
  build:
    name: release-to-nuget
    runs-on: self-hosted
    # Override the runner's Restricted PowerShell execution policy at Process scope so the
    # powershell steps below can load their temp scripts. Process scope wins over LocalMachine,
    # and using the env var (rather than a custom -ExecutionPolicy shell) keeps GitHub's built-in
    # $LASTEXITCODE propagation intact, so a failing test/build still blocks the publish.
    # Fixes the publish failing at "Extract Version from Tag" with
    # "running scripts is disabled on this system" (PSSecurityException / UnauthorizedAccess).
    env:
      PSExecutionPolicyPreference: Bypass
    steps:
      - name: Free disk space
        shell: powershell
        run: |
          # Remove previous build artifacts to prevent "not enough space on disk" errors
          # on the self-hosted runner across repeated release runs.
          $paths = @(
            (Join-Path $env:GITHUB_WORKSPACE "clio\bin"),
            (Join-Path $env:GITHUB_WORKSPACE "clio.tests\bin"),
            (Join-Path $env:GITHUB_WORKSPACE "output"),
            (Join-Path $env:GITHUB_WORKSPACE "tool-smoke")
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "Removing $p"
              Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue
            }
          }
          dotnet build-server shutdown 2>$null

      - uses: actions/checkout@v5
        with:
          fetch-depth: 1  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Extract Version from Tag
        id: extract_version
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          # Remove 'v' prefix if present (e.g., v8.0.1.42 -> 8.0.1.42)
          $version = $tag -replace '^v', ''
          
          # Validate version format (should be like 8.0.1.42)
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Invalid version format: $version. Expected format: X.Y.Z.W (e.g., 8.0.1.42)"
          }
          
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Extracted version: $version"
        shell: powershell

      - name: Test Solution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
            $ErrorActionPreference = 'Stop'
            $version = "${{ steps.extract_version.outputs.VERSION }}"
            echo "Testing clio with version: $version"
            dotnet test .\clio.tests\clio.tests.csproj -nowarn:none `
            /p:CollectCoverage=true /p:CoverletOutputFormat=opencover `
            /p:CoverletOutput=".\..\TestResults\coverage.opencover.xml" `
            /p:AssemblyVersion=$version /p:FileVersion=$version /p:Version=$version;

#      - name: Build and analyze
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#          SONAR_URL: ${{ secrets.SONAR_URL }}
#        shell: powershell
#        run: |
#          dotnet build-server shutdown;
#          dotnet build .\Clio.Analyzers\Clio.Analyzers.csproj
#          $version = "${{ steps.extract_version.outputs.VERSION }}"
#          echo "Building clio with version: $version"
#          C:\Tools\dotnet-coverage.exe collect "dotnet test .\clio.tests\clio.tests.csproj" -f xml -o "coverage.xml";
#          dotnet sonarscanner begin /k:"clio" /d:sonar.host.url="${{ secrets.SONAR_URL }}" `
#          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" `
#          /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml;
#          dotnet build .\clio\clio.csproj -c Release --no-incremental /p:AssemblyVersion=$version /p:FileVersion=$version /p:Version=$version;
#          dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}";
#          dotnet build-server shutdown;

      - name: Pack clio with release version
        run: |
          $version = "${{ steps.extract_version.outputs.VERSION }}"
          echo "Building clio with version: $version"
          dotnet build .\clio\clio.csproj -c Release --no-incremental `
            /p:ContinuousIntegrationBuild=true `
            /p:GeneratePackageOnBuild=false `
            /p:AssemblyVersion=$version /p:FileVersion=$version /p:Version=$version /p:InformationalVersion=$version
          echo "Packing clio with version: $version"
          dotnet pack .\clio\clio.csproj --configuration Release --no-build --output ./output `
            /p:GeneratePackageOnBuild=false `
            /p:AssemblyVersion=$version /p:FileVersion=$version /p:Version=$version /p:InformationalVersion=$version
        shell: powershell

      - name: Verify packaged tool version
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ steps.extract_version.outputs.VERSION }}"
          $toolPath = Join-Path $PWD "tool-smoke"
          # Remove any leftover tool-path so a stale install manifest cannot make the install below
          # fail with exit code 1. This replaces a prior `dotnet tool uninstall` call, which always
          # targeted the just-deleted path and, under $ErrorActionPreference='Stop' in PowerShell 5.1,
          # promoted its "Tool path does not exist." stderr to a terminating error that failed the step.
          if (Test-Path $toolPath) {
            Remove-Item $toolPath -Recurse -Force
          }

          # The repo nuget.config enables <packageSourceMapping>, and newer NuGet SDKs hard-reject
          # `--add-source` when source mapping is active ("The --add-source option cannot be combined
          # with package source mapping"). Instead of --add-source, write a dedicated smoke config that
          # maps the freshly packed `clio` to the local ./output source and routes everything else the
          # same way the repo config does, then install with --configfile. This keeps the smoke test
          # working regardless of the runner's NuGet source-mapping enforcement.
          $outputSource = Join-Path $PWD "output"
          $smokeConfig = Join-Path $PWD "tool-smoke-nuget.config"
          @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local-output" value="$outputSource" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="Terrasoft" value="https://ts1-infr-nexus.bpmonline.com/repository/nuget-v3/index.json" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="local-output">
                <package pattern="clio" />
              </packageSource>
              <packageSource key="nuget.org">
                <package pattern="*" />
                <package pattern="creatio.client" />
              </packageSource>
              <packageSource key="Terrasoft">
                <package pattern="Terrasoft.*" />
                <package pattern="Creatio.*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          "@ | Set-Content -Path $smokeConfig -Encoding UTF8

          dotnet tool install clio --tool-path $toolPath --version $version --configfile $smokeConfig
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet tool install failed with exit code $LASTEXITCODE"
          }

          $clioExecutable = Join-Path $toolPath "clio"
          if (-not (Test-Path $clioExecutable)) {
            $clioExecutable = Join-Path $toolPath "clio.exe"
          }

          $reportedVersion = & $clioExecutable info --clio
          if (-not $reportedVersion) {
            throw "Packaged tool did not report a version."
          }

          $reportedVersionText = "$reportedVersion".Trim()
          $reportedVersionMatch = [regex]::Match($reportedVersionText, "\d+\.\d+\.\d+\.\d+")
          if (-not $reportedVersionMatch.Success) {
            throw "Packaged tool did not contain a semantic version. Output: '$reportedVersionText'."
          }

          if ($reportedVersionMatch.Value -ne $version) {
            throw "Packaged tool version mismatch. Expected '$version', got '$($reportedVersionMatch.Value)' from '$reportedVersionText'."
          }

          echo "Verified packaged tool version: $reportedVersion"

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.CLIO_NUGET_API_KEY }}
        run: |
          $version = "${{ steps.extract_version.outputs.VERSION }}"
          echo "Publishing clio package version $version to NuGet..."
          dotnet nuget push ".\output\*.nupkg" --api-key ${{ secrets.CLIO_NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
          echo "Successfully published clio $version to NuGet!"
