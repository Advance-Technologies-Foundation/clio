kind: PersistentVolume
apiVersion: v1
metadata:
  name: clio-mssql-data-pv
  labels:
    type: local
    app: clio-mssql
spec:
  storageClassName: clio-storage
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "{{CLIO_INFRA_ROOT}}/mssql"
    type: DirectoryOrCreate
