  - id: story-mcp-http-standard-authorization-2
    title: "Auth configuration options (issuer/audience/scopes) + OIDC discovery"
    feature: "mcp-http-standard-authorization"
    size: S
    status: done
    depends_on: [story-mcp-http-standard-authorization-1]
    blocks: [story-mcp-http-standard-authorization-3, story-mcp-http-standard-authorization-4, story-mcp-http-standard-authorization-5]
    note: "DONE 2026-07-11. AuthConfiguration + AuthEnvironment (5 --auth-* flags + CLIO_MCP_HTTP_AUTH_* env); enabled iff --auth-authority set; models discovery-authority + valid-issuers + audiences + required-scopes + RequireHttpsMetadata (allow-insecure opt-out). 12 unit tests. Validated: dotnet test --filter Category=Unit&Module=McpServer."
    file: spec/stories/story-mcp-http-standard-authorization-2.md

  - id: story-mcp-http-standard-authorization-3
    title: "JWT bearer Resource-Server validation (AddJwtBearer)"
    feature: "mcp-http-standard-authorization"
    size: M
    status: done
    depends_on: [story-mcp-http-standard-authorization-1, story-mcp-http-standard-authorization-2]
    blocks: [story-mcp-http-standard-authorization-4, story-mcp-http-standard-authorization-5]
    note: "DONE 2026-07-11. McpHttpAuthentication: AddJwtBearer (issuer/audience/RS256+PS256/lifetime, MapInboundClaims=false, iss trailing-slash normalization) + AddAuthorization 'mcp' policy via RequireAssertion lambda scope-check (scope/scp, NOT a handler class -> avoids assembly-scan/ValidateOnBuild trap). Wired in Run() behind Enabled gate + UseAuthentication/UseAuthorization (hermetic fail-safe off). JwtBearer pkg per-TFM (10.0.9 net10 / 8.0.11 net8). 12 unit tests. NOTE: endpoint enforcement (RequireAuthorization) + full HTTP 401/403 matrix are Story 5; here validation-params + scope-policy + DI-compose are unit-tested."
    file: spec/stories/story-mcp-http-standard-authorization-3.md

  - id: story-mcp-http-standard-authorization-4
    title: "Protected Resource Metadata + WWW-Authenticate (SDK handler)"
    feature: "mcp-http-standard-authorization"
    size: S
    status: done
    depends_on: [story-mcp-http-standard-authorization-2, story-mcp-http-standard-authorization-3]
    blocks: [story-mcp-http-standard-authorization-5]
    note: "DONE 2026-07-11. OQ-F resolved by decompiling pinned SDK 1.4.0: AddMcp() default ForwardAuthenticate=\"Bearer\" matches JwtBearerDefaults; DefaultChallengeScheme=McpAuth routes 401 through McpAuthenticationHandler (RFC 9728 resource_metadata challenge); handler is IAuthenticationRequestHandler so .well-known is served unconditionally+anonymously, no endpoint mapping needed. ProtectedResourceMetadata ships in transitive ModelContextProtocol.Core, no new package. OQ-C resolved by design (Resource left null -> per-request auto-derivation from Host header; --auth-resource override available). Verified with REAL TestServer pipeline (McpHttpAuthenticationPipelineTests): 401+WWW-Authenticate, anonymous .well-known, valid->200, wrong-aud/expired->401, missing-scope->403. 11 new tests."
    file: spec/stories/story-mcp-http-standard-authorization-4.md

  - id: story-mcp-http-standard-authorization-5
    title: "Protect whole endpoint (RequireAuthorization) + fail-safe + public-bind guard"
    feature: "mcp-http-standard-authorization"
    size: M
    status: done
    depends_on: [story-mcp-http-standard-authorization-3, story-mcp-http-standard-authorization-4]
    blocks: [story-mcp-http-standard-authorization-6]
    note: "DONE 2026-07-11. OQ-A resolved: REFUSE security-first (EvaluatePublicBindGuard) -- public/wildcard host + auth off refuses to start (WriteError+exit1) unless --allow-insecure-public (+env), which starts with WriteWarning instead. MapMcp(path).RequireAuthorization(mcp) applied when enabled -> passthrough AND -e/stored both need a token, closing the ENG-93208 partial-coverage gap. Middleware ordering already correct from Story 3 (UseAuthorization short-circuits before EnforcePlatformApiKeyGate/CaptureCredentialContext). Verified: 4 guard-matrix unit tests + real TestServer pipeline test (auth-disabled reaches endpoint with no token, AC-04); all Story-4 401/403 cases re-verified with enforcement now on the endpoint itself. 5 new tests."
    file: spec/stories/story-mcp-http-standard-authorization-5.md

  - id: story-mcp-http-standard-authorization-6
    title: "Back-door hardening: header strip, gateway->tenant authZ, no-token-passthrough invariant"
    feature: "mcp-http-standard-authorization"
    size: M
    status: done
    depends_on: [story-mcp-http-standard-authorization-1, story-mcp-http-standard-authorization-5]
    blocks: [story-mcp-http-standard-authorization-7]
    note: "DONE 2026-07-11 (FR-08 scoped down, see ADR OQ-G). FR-07 header-strip: CaptureCredentialContext gained requireAuthenticatedPrincipal (threaded from authConfiguration.Enabled) -- when standard OAuth is configured, an unauthenticated request's X-Integration-Credentials is explicitly ignored, not just deferred by middleware order (covers a non-/mcp path too). Additive: OAuth-off mode unaffected. FR-09 invariant proven structurally + by test: ToolCommandResolver.BuildEphemeralSettings reads only the parsed CredentialContext, never Request.Headers.Authorization; grepped the whole outbound-client path (ApplicationClientFactory + child-container site) for confirmation. FR-13: combined-secrets test proves the existing SensitiveErrorTextRedactor already scrubs both planes (Creatio token + MCP JWT) in one message -- no new redaction pipeline needed. FR-08 (gateway->tenant authZ) explicitly NOT implemented: Story-1 spike found identity-platform's client_credentials token mints no per-tenant/org claim, so there is no real contract to enforce -- inventing one would be a fictional check. Filed as a platform-team follow-up (Jira comment); today any authenticated gateway may assert any tenant, same trust boundary as the retiring platform-api-key gate (not a regression). 5 new tests (CredentialPassthroughAuthHardeningTests.cs x4, SensitiveErrorTextRedactorTests.cs x1)."
    file: spec/stories/story-mcp-http-standard-authorization-6.md

