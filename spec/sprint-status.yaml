    note: "DONE 2026-07-11. OQ-D resolved per ADR D-6: retired as default front door, kept as opt-in dev/offline fallback. EnforcePlatformApiKeyGate branches on authorizationEnabled -- when OAuth is configured, the legacy key check is bypassed entirely (not combined/ANDed/ORed -- the two schemes can't coexist on one Authorization header once JwtBearerHandler claims it) and PassthroughEnabledItemKey is derived solely from context.User.Identity.IsAuthenticated; when OAuth is off, unchanged pre-ENG-93386 behavior. New pure predicate ShouldWarnPlatformApiKeyIgnored triggers a startup warning when both are configured together (inert, not insecure, but flagged). Unified taxonomy (FR-11) was already substantially closed by Stories 5/6; this story removes the remaining two-Bearer-schemes ambiguity. CLI HelpText + help/en/mcp-http.txt + docs/commands/mcp-http.md updated to state the retired/fallback disposition. 7 new tests in PlatformApiKeyDispositionTests.cs."
    file: spec/stories/story-mcp-http-standard-authorization-7.md

  - id: story-mcp-http-standard-authorization-8
    title: "Per-tool authorization filters (optional), docs, e2e"
    feature: "mcp-http-standard-authorization"
    size: M
    status: done
    depends_on: [story-mcp-http-standard-authorization-7]
    blocks: []
    note: "DONE 2026-07-11 (FR-10 scoped down, see ADR). FR-10 per-tool AddAuthorizationFilters not implemented -- same reasoning class as Story 6's FR-08: identity-platform issues one undifferentiated scope, so a per-tool filter would be a no-op or reject-all; endpoint-level RequireAuthorization suffices for v1 per the AC's own escape hatch. Docs: all 4 targets updated (mcp-http.txt/.md, Commands.md, McpCapabilityMap.md); no stale wording found. MCP surface: mcp-http is the server itself, not wrapped by any tool -- reviewed, no update required. E2E: McpHttpOAuthAuthorizationE2ETests.cs (5 tests) + McpHttpOAuthStand + OAuthClientCredentialsTokenFetcher authored, skip-gate verified to fire cleanly, but NOT run against a live AS (stated explicitly). FINAL ADVERSARIAL REVIEW (mandatory ready-to-merge gate) run over the whole branch diff via 3 parallel reviewers (quality/correctness-performance/security); all 3 independently converged on 2 real gaps, both fixed: (1) HIGH audience/scope fail-open -- --auth-authority alone enabled auth with no --auth-audience/--auth-required-scopes accepted ANY token from the issuer for ANY resource; fixed with new EvaluateAudienceScopeGuard (REFUSE-by-default, --auth-allow-any-audience escape hatch). (2) MEDIUM public-bind guard only recognized 4 literal wildcard spellings, missing concrete LAN/public IP/DNS binds; fixed via IsPublicBind (any non-loopback host). Also fixed: duplicated/inconsistent truthy-env-var parser unified, stale e2e-harness doc wording, ADR Status Proposed->Accepted. 16 new/updated tests (AudienceScopeGuardTests.cs x5, PublicBindGuardTests.cs +11). Full McpServer unit suite: 2087 passed/0 failed/1 skipped, both net8.0/net10.0. ALL 8 STORIES OF ENG-93386 NOW DONE."
    file: spec/stories/story-mcp-http-standard-authorization-8.md

